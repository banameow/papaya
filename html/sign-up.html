<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Papaya – Sign Up | ITCS223 Phase II -->
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Papaya – Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="bg-white">
<main class="d-flex flex-column align-items-center justify-content-center min-vh-100 py-5 px-3">

  <a href="index.html" class="papaya-logo text-dark text-decoration-none mb-1">&#9700;apaya</a>
  <p class="text-muted mb-4 small">Ready to Plug In? Create Your Account Now.</p>

  <div class="border rounded-4 p-4 w-100" style="max-width:480px">
    <form id="signupForm" novalidate>

      <div class="mb-3">
        <label for="su-username" class="form-label fw-semibold small">Username</label>
        <input type="text" id="su-username" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="Choose a username" required/>
      </div>
      <div class="mb-3">
        <label for="su-email" class="form-label fw-semibold small">Email</label>
        <input type="email" id="su-email" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="you@example.com" required/>
      </div>
      <div class="mb-3">
        <label for="su-phone" class="form-label fw-semibold small">Phone Number</label>
        <input type="tel" id="su-phone" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="0XX-XXX-XXXX"/>
      </div>
      <div class="mb-3">
        <label for="su-address" class="form-label fw-semibold small">Address</label>
        <input type="text" id="su-address" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="Street, City, Postcode"/>
      </div>
      <div class="mb-3">
        <label for="su-pass" class="form-label fw-semibold small">Password</label>
        <input type="password" id="su-pass" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="••••••••" required/>
      </div>
      <div class="mb-4">
        <label for="su-confirm" class="form-label fw-semibold small">Confirm Password</label>
        <input type="password" id="su-confirm" class="form-control rounded-pill bg-dark text-white border-0"
          placeholder="••••••••" required/>
      </div>

      <div id="signupError" class="text-danger mb-2 small d-none"></div>

      <button type="submit" class="btn btn-outline-dark w-100 rounded-pill py-2 fw-semibold">Sign Up</button>
    </form>
  </div>

  <p class="text-muted mt-3 small">Initialize Your Journey. Join the Papaya Family</p>
  <p class="small text-muted">Already a member? <a href="login.html" class="text-dark fw-bold">Log in</a></p>
  <a href="index.html" class="text-muted small mt-2 text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>Back to Home
  </a>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
  /* Sign-up handler – Phase II: replace with fetch POST to /api/auth/register */
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const pass = document.getElementById('su-pass').value;
    const conf = document.getElementById('su-confirm').value;
    const err  = document.getElementById('signupError');
    if (pass !== conf) { err.textContent = 'Passwords do not match.'; err.classList.remove('d-none'); return; }
    err.classList.add('d-none');
    alert('Account created! Please log in.');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
