<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Papaya – Cart | ITCS223 Phase II -->
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Papaya – Cart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<header class="papaya-topbar bg-white border-bottom">
  <div class="d-flex align-items-center justify-content-between px-4 py-2 border-bottom">
    <a href="index.html" class="papaya-logo text-dark text-decoration-none">&#9700;apaya</a>
    <div class="d-flex align-items-center gap-2">
      <a href="search.html" class="btn btn-outline-dark btn-sm rounded-pill px-3"><i class="bi bi-search me-1"></i>search</a>
      <a href="login.html" class="btn btn-outline-dark btn-sm rounded-pill px-3"><i class="bi bi-person-circle me-1"></i>User</a>
      <a href="cart.html" class="text-dark fs-5 position-relative">
        <i class="bi bi-cart3"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem" id="cartCount">1</span>
      </a>
    </div>
  </div>
  <nav class="papaya-nav d-flex align-items-center px-3">
    <a href="index.html" class="nav-link">Home</a>
    <a href="products.html" class="nav-link">Products</a>
    <a href="team.html" class="nav-link">Team</a>
    <a href="login.html" class="nav-link ms-auto text-secondary small"><i class="bi bi-lock-fill me-1"></i>Admin</a>
  </nav>
</header>

<main class="container-fluid px-4 px-md-5 py-4">
  <h1 class="fw-bold mb-4">Cart <span id="cartItemCount" class="fw-normal">(1)</span></h1>

  <div class="row g-4">

    <!-- Cart items -->
    <div class="col-12 col-md-8">
      <section aria-label="Cart items">

        <article class="cart-item d-flex align-items-center gap-3 bg-light rounded-4 p-3 mb-3" data-price="4050">
          <img src="https://placehold.co/80x80/ffffff/71717a?text=AirPods"
               alt="Apple AirPods 4" class="cart-item-img bg-white"/>
          <div class="flex-grow-1">
            <p class="fw-bold mb-0">Apple AirPods 4</p>
            <small class="text-muted">Brand : Apple &nbsp; ID:apple123456</small>
          </div>
          <span class="text-price fw-bold me-2">4,050</span>
          <div class="qty-control border rounded-pill overflow-hidden">
            <button class="qty-btn qty-minus">−</button>
            <input class="qty-val" type="number" value="1" min="1" readonly/>
            <button class="qty-btn qty-plus">+</button>
          </div>
          <button class="btn btn-link text-muted p-0 ms-1" onclick="removeCartItem(this)" aria-label="Remove">
            <i class="bi bi-trash3"></i>
          </button>
        </article>

      </section>
      <a href="search.html" class="text-muted text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Continue Shopping
      </a>
    </div>

    <!-- Order Summary -->
    <div class="col-12 col-md-4">
      <aside class="bg-light rounded-4 p-4" aria-label="Order summary">

        <!-- Coupon -->
        <div class="d-flex gap-2 mb-3">
          <input type="text" id="couponInput" class="form-control form-control-sm rounded-3"
            placeholder="Enter coupon code"/>
          <button class="btn btn-outline-dark btn-sm rounded-3 px-3" onclick="applyCoupon()">Apply</button>
        </div>
        <div id="couponMsg" class="mb-2 small"></div>
        <hr class="my-3"/>

        <div class="d-flex justify-content-between small mb-2">
          <span>Subtotal</span><span id="cart-subtotal">4,050</span>
        </div>
        <div class="d-flex justify-content-between small mb-3">
          <span>Discount</span>
          <span>- <span id="cart-discount" data-discount="0">0</span></span>
        </div>
        <div class="d-flex justify-content-between fw-bold border-top pt-3 mb-3">
          <span>Total</span><span id="cart-total">4,050</span>
        </div>

        <button class="btn btn-dark w-100 rounded-3 py-2 fw-semibold">Proceed to checkout</button>
      </aside>
    </div>

  </div>
</main>

<footer class="border-top mt-5 py-4 px-4 px-md-5">
  <div class="row g-4">
    <div class="col-12 col-md-3">
      <div class="papaya-logo mb-2">&#9700;apaya</div>
      <div class="text-muted" style="font-size:.82rem;line-height:1.8">Address: 123 IT Street<br>Email: hello@papaya.tech</div>
    </div>
    <div class="col-6 col-md-2">
      <p class="fw-bold mb-3" style="font-size:.9rem">About us</p>
      <a href="#" class="d-block text-muted text-decoration-none mb-2 small">Contact Us</a>
    </div>
    <div class="col-12 col-md-3 ms-auto">
      <p class="fw-bold mb-3" style="font-size:.9rem">Follow us</p>
      <div class="d-flex gap-2">
        <a href="#" class="btn btn-outline-secondary btn-sm rounded-circle p-1" style="width:34px;height:34px"><i class="bi bi-facebook"></i></a>
        <a href="#" class="btn btn-outline-secondary btn-sm rounded-circle p-1" style="width:34px;height:34px"><i class="bi bi-instagram"></i></a>
      </div>
    </div>
  </div>
  <div class="border-top mt-4 pt-3 text-center text-muted" style="font-size:.8rem">&copy; 2026 Papaya.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
