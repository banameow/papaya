</head>
<body>

<!-- ══ MAIN ══════════════════════════════════════════════════════ -->
<main class="container-fluid px-4 px-md-5 py-4">

  <h1 class="fw-bold mb-4" style="font-size:1.9rem">Search</h1>

  <!-- Search Filter Card -->
  <section aria-label="Search filters">
    <form id="searchForm" class="border rounded-4 p-4 mb-4 bg-white" onsubmit="runSearch(event)">

      <div class="row g-3">

        <!-- Criterion 1: Name -->
        <div class="col-12">
          <label for="search-name" class="form-label fw-semibold small">Name</label>
          <input type="text" id="search-name" class="form-control rounded-3" placeholder="e.g. iPhone, MSI, Lenovo"/>
        </div>

        <!-- Criterion 2: Category -->
        <div class="col-12 col-md-4">
          <label for="search-category" class="form-label fw-semibold small">Category</label>
          <select id="search-category" class="form-select rounded-3">
            <option value="">All Categories</option>
          </select>
        </div>

        <!-- Criterion 3: Brand -->
        <div class="col-12 col-md-4">
          <label for="search-brand" class="form-label fw-semibold small">Brand</label>
          <input type="text" id="search-brand" class="form-control rounded-3" placeholder="e.g. Apple, Samsung"/>
        </div>

        <!-- Criterion 4: Price range -->
        <div class="col-12 col-md-4">
          <label class="form-label fw-semibold small">Price Range ($)</label>
          <div class="d-flex align-items-center gap-2">
            <input type="number" id="search-price-min" class="form-control rounded-3"
              placeholder="Min" min="0"/>
            <span class="text-muted">–</span>
            <input type="number" id="search-price-max" class="form-control rounded-3"
              placeholder="Max" min="0"/>
          </div>
        </div>

      </div><!-- /row -->

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-dark px-4 rounded-3">
          <i class="bi bi-search me-2"></i>Search
        </button>
        <button type="button" class="btn btn-outline-secondary px-4 rounded-3" onclick="resetSearch()">
          Clear
        </button>
      </div>

    </form>
  </section>

  <!-- ── Results (hidden until search is clicked) ── -->
  <section id="searchResults" class="d-none" aria-label="Search results">

    <!-- Result header -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="fw-bold mb-0" style="font-size:1rem">
        Results: <span id="resultCount" class="text-muted fw-normal">0 products</span>
      </h2>
    </div>

    <!-- Product grid -->
    <div class="row g-3" id="productGrid"></div>

    <!-- No results message -->
    <div id="noResults" class="d-none text-center py-5">
      <i class="bi bi-search fs-1 text-muted"></i>
      <p class="mt-3 text-muted">No products found matching your search criteria.</p>
      <button class="btn btn-outline-dark mt-2" onclick="resetSearch()">Clear Filters</button>
    </div>

  </section><!-- /searchResults -->

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  async function runSearch(e) {
    if (e) e.preventDefault();

    // 1. Gather values from the form
    const name = document.getElementById('search-name').value.trim();
    const category = document.getElementById('search-category').value;
    const brand = document.getElementById('search-brand').value.trim();
    const minPrice = document.getElementById('search-price-min').value;
    const maxPrice = document.getElementById('search-price-max').value;

    // 2. Build the query string for the API
    const params = new URLSearchParams();
    if (name) params.append("name", name);
    if (category) params.append("category", category);
    if (brand) params.append("brand", brand);
    if (minPrice) params.append("minPrice", minPrice);
    if (maxPrice) params.append("maxPrice", maxPrice);

    try {
      // 3. Fetch from the backend
      const res = await fetch(`${BASE_SERVER_URL}/api/products/search?${params.toString()}`);
      if (!res.ok) throw new Error("Search failed");
      
      const products = await res.json();
      
      // 4. Update the UI Counters
      document.getElementById('searchResults').classList.remove('d-none');
      document.getElementById('resultCount').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
      document.getElementById('noResults').classList.toggle('d-none', products.length > 0);

      // 5. Inject the cards into the grid
      const grid = document.getElementById('productGrid');
      grid.innerHTML = ""; // Clear previous results
      
      // Re-use your createProductCard function from script.js!
      products.forEach(p => {
        grid.appendChild(createProductCard(p));
      });

      // Smooth scroll to results
      document.getElementById('searchResults').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      console.error("Search error:", err);
      alert("Failed to perform search. Please check the backend.");
    }
  }

  function resetSearch() {
    document.getElementById('searchForm').reset();
    document.getElementById('searchResults').classList.add('d-none');
    document.getElementById('productGrid').innerHTML = ""; 
  }
</script>
</body>
</html>
