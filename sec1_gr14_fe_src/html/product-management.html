<!-- ══ MAIN ══════════════════════════════════════════════════════ -->
<main class="container-fluid px-4 px-md-5 py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="fw-bold mb-0" style="font-size:1.9rem">Product Management</h1>
    <a href="add-product.html" class="btn btn-dark fw-bold rounded-3 px-3">
      <i class="bi bi-plus-lg me-1"></i>ADD PRODUCT
    </a>
  </div>

  <div class="row g-3" id="adminProductGrid">
    <div class="text-center text-muted py-5">Loading inventory...</div>
  </div>
</main>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-info-circle text-muted"></i>
          <h5 class="modal-title mb-0" id="deleteModalLabel">
            Delete Product ID: <span id="deleteProductId">—</span>
          </h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2 pb-1">
        <p id="deleteProductName" class="text-muted small mb-0">Product name</p>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-danger rounded-3 px-4" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>
